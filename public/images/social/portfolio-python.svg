    <text x="30" y="88" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="16">from bs4 import BeautifulSoup</text>
    <text x="30" y="118" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="16">import requests</text>
    <text x="30" y="176" fill="#a8b7cc" font-family="ui-monospace,monospace" font-size="16">def collect_data(url):</text>
    <text x="50" y="206" fill="#a8b7cc" font-family="ui-monospace,monospace" font-size="16">response = requests.get(url)</text>
    <text x="50" y="236" fill="#a8b7cc" font-family="ui-monospace,monospace" font-size="16">return transform(response)</text>
